<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營建工地每日噴灑水作業紀錄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{--bg:#f5f5f0;--card:#fff;--border:#c8c8c0;--text:#2a2a2a;--text-light:#6b6b6b;--accent:#2d5a27;--accent-light:#e8f0e6;--am:#3a6ea5;--pm:#b8651a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app-header{background:var(--accent);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .app-header h1{font-size:17px;font-weight:700;letter-spacing:1px;}
  .tabs{display:flex;gap:3px;margin-left:auto;}
  .tab-btn{padding:7px 18px;border:none;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;font-size:13px;font-weight:500;border-radius:6px 6px 0 0;cursor:pointer;transition:background .2s;}
  .tab-btn.active{background:var(--card);color:var(--accent);}
  .sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:6px;vertical-align:middle;}
  .sync-dot.ok{background:#2ecc71;}.sync-dot.err{background:#e74c3c;}.sync-dot.loading{background:#f1c40f;animation:pulse .8s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .meta-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .meta-bar label{font-size:13px;font-weight:500;color:var(--text-light);}
  .meta-bar input,.meta-bar select{border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-family:inherit;font-size:13px;}
  .meta-bar .mg{display:flex;align-items:center;gap:5px;}
  .project-input{width:260px;}
  .start-date-picker{background:var(--accent-light);border:2px solid var(--accent);border-radius:6px;padding:4px 10px;font-size:13px;font-weight:500;color:var(--accent);width:150px;}
  .loc-select{border:2px solid var(--am)!important;border-radius:6px;padding:4px 10px;font-weight:500;color:var(--am);background:#eef4fa;min-width:90px;}
  .loc-custom{width:120px;display:none;border:2px solid var(--am)!important;border-radius:6px;padding:4px 10px;font-weight:500;color:var(--am);background:#eef4fa;}
  .loc-custom.show{display:inline-block;}

  .container{max-width:1200px;margin:0 auto;padding:16px;}
  .record-table-wrap{background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  table.rt{width:100%;border-collapse:collapse;font-size:13px;}
  table.rt thead th{background:var(--accent);color:#fff;padding:9px 6px;font-weight:500;font-size:11px;text-align:center;white-space:nowrap;border-right:1px solid rgba(255,255,255,.15);}
  table.rt thead th:last-child{border-right:none;}
  table.rt tbody td{padding:5px;border-bottom:1px solid #eee;border-right:1px solid #eee;text-align:center;vertical-align:middle;}
  .day-header{background:var(--accent-light)!important;font-weight:700;font-size:13px;color:var(--accent);}
  .day-header td{padding:7px 12px!important;text-align:left!important;border-bottom:2px solid var(--accent)!important;}
  .day-label-date{font-weight:400;margin-left:10px;color:var(--text);font-size:13px;}
  .period-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;color:#fff;min-width:36px;}
  .period-am{background:var(--am);}.period-pm{background:var(--pm);}
  table.rt input[type="time"],table.rt input[type="number"],table.rt input[type="text"]{border:1px solid #ddd;border-radius:4px;padding:3px 5px;font-family:inherit;font-size:12px;width:100%;text-align:center;background:transparent;}
  table.rt input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light);}
  table.rt input[type="number"]{width:72px;}
  .mc{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .mc label{display:flex;align-items:center;gap:2px;font-size:11px;cursor:pointer;white-space:nowrap;}
  .mc input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px;}
  .auto-filled{background:#f0f5ee!important;color:#3a7a33;}

  .photo-grid-ui{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .photo-card{background:var(--card);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
  .photo-card-header{display:flex;gap:10px;padding:8px 12px;background:#f9f9f6;border-bottom:1px solid #eee;align-items:center;flex-wrap:wrap;}
  .photo-card-header label{font-size:12px;color:var(--text-light);font-weight:500;white-space:nowrap;}
  .loc-tag{font-size:12px;font-weight:600;color:var(--am);background:#eef4fa;padding:2px 8px;border-radius:4px;}
  .date-display{font-size:12px;font-weight:500;color:var(--accent);white-space:nowrap;}
  .photo-drop{height:200px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:#fafaf7;transition:background .2s;}
  .photo-drop:hover{background:var(--accent-light);}
  .photo-drop img{width:100%;height:100%;object-fit:contain;display:none;}
  .photo-drop .ph{text-align:center;color:#aaa;font-size:12px;pointer-events:none;}
  .photo-drop .ph svg{display:block;margin:0 auto 4px;}
  .photo-drop input[type="file"]{display:none;}
  .photo-drop.has-img .ph{display:none;}
  .photo-drop.has-img img{display:block;}

  .sig-section{background:var(--card);border-radius:8px;padding:14px 18px;margin-top:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .sig-section .sg label{display:block;font-size:12px;color:var(--text-light);margin-bottom:5px;font-weight:500;}
  .sig-section .sg input{width:100%;border:none;border-bottom:1px solid var(--border);padding:5px 4px;font-family:inherit;font-size:13px;background:transparent;}
  .sig-section .sg input:focus{outline:none;border-bottom-color:var(--accent);}
  .sig-img-area{margin-top:6px;display:flex;align-items:center;gap:8px;}
  .sig-img-preview{height:50px;max-width:180px;object-fit:contain;border:1px dashed var(--border);border-radius:4px;padding:2px;background:#fafaf7;display:none;}
  .sig-img-preview.has{display:block;border-style:solid;}
  .sig-img-btn{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:4px;background:#fafaf7;cursor:pointer;font-family:inherit;color:var(--text-light);transition:all .2s;}
  .sig-img-btn:hover{background:var(--accent-light);color:var(--accent);}
  .sig-img-clear{padding:4px 8px;font-size:11px;border:none;background:transparent;color:#c0392b;cursor:pointer;display:none;}
  .sig-img-clear.has{display:inline;}
  .note-text{margin-top:10px;font-size:11px;color:var(--text-light);line-height:1.6;}

  .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
  .btn{padding:8px 18px;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#1e4a1a;}
  .btn-save{background:#2980b9;color:#fff;}.btn-save:hover{background:#1f6da3;}
  .btn-pdf{background:#c0392b;color:#fff;}.btn-pdf:hover{background:#a93226;}
  .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);}.btn-outline:hover{background:var(--accent-light);}
  .btn-danger{background:transparent;color:#c0392b;border:1px solid #e0b4b0;}.btn-danger:hover{background:#fdf0ef;}
  .btn-sm{padding:5px 12px;font-size:12px;border-radius:4px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .hidden{display:none!important;}

  .list-toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
  .list-toolbar input,.list-toolbar select{border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-family:inherit;font-size:13px;}
  .list-toolbar input{width:180px;}.list-toolbar select{width:140px;}
  .list-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .list-table thead th{background:var(--accent);color:#fff;padding:10px 12px;font-size:12px;font-weight:500;text-align:left;cursor:pointer;white-space:nowrap;}
  .list-table thead th:hover{background:#1e4a1a;}
  .list-table tbody tr{border-bottom:1px solid #eee;transition:background .15s;}
  .list-table tbody tr:hover{background:var(--accent-light);}
  .list-table tbody td{padding:10px 12px;font-size:13px;}
  .list-table tbody .no-data{text-align:center;color:#aaa;padding:40px;font-size:14px;}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;background:#eef4fa;color:var(--am);}

  .toast{position:fixed;top:20px;right:20px;background:#2d5a27;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2);}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.error{background:#c0392b;}

  .saving-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:99998;align-items:center;justify-content:center;}
  .saving-overlay.active{display:flex;}
  .saving-box{background:#fff;padding:30px 40px;border-radius:12px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.2);}
  .saving-box .spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .saving-box p{font-size:14px;color:var(--text);}

  /* Post-save dialog */
  .dialog-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:99997;align-items:center;justify-content:center;}
  .dialog-overlay.active{display:flex;}
  .dialog-box{background:#fff;padding:28px 32px;border-radius:12px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.2);max-width:380px;width:90%;}
  .dialog-box h3{font-size:16px;margin-bottom:6px;color:var(--accent);}
  .dialog-box p{font-size:13px;color:var(--text-light);margin-bottom:18px;}
  .dialog-box .btn{margin:0 6px;}

  #pdfOverlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#fff;z-index:99999;overflow:auto;}
  #pdfOverlay.active{display:block;}

  /* Preview modal */
  #previewModal{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.5);z-index:99990;overflow:auto;padding:20px;}
  #previewModal.active{display:block;}
  .preview-inner{max-width:1100px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .preview-toolbar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--accent);color:#fff;}
  .preview-toolbar h3{font-size:15px;font-weight:600;flex:1;}
  .preview-toolbar .btn{color:#fff;border-color:rgba(255,255,255,.4);}
  .preview-toolbar .btn:hover{background:rgba(255,255,255,.15);}
  .preview-toolbar .btn-pdf{border:none;}
  .preview-body{padding:0;max-height:calc(100vh - 120px);overflow:auto;}
  .preview-body .pf-page{padding:20px 28px 16px 28px;}
  #pdfContent{width:1080px;margin:0;padding:0;background:#fff;font-family:'Noto Sans TC',sans-serif;color:#000;}
  .pf-page{padding:24px 32px 20px 32px;background:#fff;position:relative;}
  .pf-loc-corner{position:absolute;top:24px;right:32px;font-size:12px;font-weight:700;color:#000;}
  .pf-hdr{text-align:center;font-size:11px;font-weight:500;line-height:1.4;}
  .pf-hdr-en{text-align:center;font-size:9px;color:#333;margin-bottom:6px;}
  .pf-title{text-align:center;font-size:15px;font-weight:700;margin-bottom:6px;}
  .pf-meta{font-size:11px;margin-bottom:6px;}
  .pf-tbl{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;}
  .pf-tbl th,.pf-tbl td{border:1.2px solid #000;padding:10px 4px;text-align:center;vertical-align:middle;}
  .pf-tbl th{font-weight:700;font-size:10px;}
  .pf-cb{display:inline-block;width:10px;height:10px;border:1.2px solid #000;vertical-align:middle;margin-right:1px;text-align:center;font-size:7px;line-height:10px;}
  .pf-cb.ck{background:#000;color:#fff;}.pf-cb.ck::after{content:'✓';}
  .pf-mi{white-space:nowrap;margin:0 2px;font-size:9px;}
  .pf-decl{font-size:9px;margin-top:6px;line-height:1.5;}
  .pf-sig-row{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;}
  .pf-sig-row>div{flex:1;}
  .pf-sig-val{border-bottom:1px solid #000;min-height:24px;margin-top:2px;padding:2px 4px;font-size:11px;}
  .pf-note{font-size:9px;margin-top:6px;color:#333;}
  .pf-break{height:0;overflow:hidden;}
  .pf-photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
  .pf-pcell{border:1.2px solid #000;overflow:hidden;}
  .pf-pcell-hd{display:flex;justify-content:space-between;padding:4px 8px;font-size:10px;border-bottom:1px solid #000;}
  .pf-pcell-body{height:230px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fff;}
  .pf-pcell-body img{max-width:100%;max-height:230px;object-fit:contain;}
  @media(max-width:768px){.photo-grid-ui{grid-template-columns:1fr;}.mc{flex-direction:column;align-items:flex-start;}table.rt{font-size:11px;}}
</style>
</head>
<body>

<div class="app-header">
  <h1>營建工地噴灑水作業紀錄 <span class="sync-dot loading" id="syncDot" title="連線狀態"></span></h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(0)">灑水紀錄表</button>
    <button class="tab-btn" onclick="switchTab(1)">照片紀錄</button>
    <button class="tab-btn" onclick="switchTab(2)">📋 已儲存紀錄</button>
  </div>
</div>

<div class="meta-bar" id="metaBar">
  <div class="mg"><label>工程名稱：</label><input type="text" id="projectName" class="project-input" value="通霄電廠第二期更新改建計畫－海底輸氣管線統包工程"></div>
  <div class="mg"><label>地點：</label>
    <select id="locSelect" class="loc-select" onchange="onLocChange()"><option value="台中">台中</option><option value="通霄">通霄</option><option value="__other">其他（自填）</option></select>
    <input type="text" id="locCustom" class="loc-custom" placeholder="輸入地點" oninput="syncLocToPhotos()">
  </div>
  <div class="mg"><label>起始日期：</label><input type="date" id="startDate" class="start-date-picker" onchange="onStartDateChange()"></div>
  <div class="mg"><button class="btn btn-outline btn-sm" onclick="randomizeTimes()">🎲 隨機時間</button></div>
</div>

<div class="container">
  <div class="tab-page" id="tab0">
    <div class="record-table-wrap"><table class="rt"><thead><tr>
      <th style="width:50px;">時段</th><th style="width:82px;">開始時間</th><th style="width:82px;">結束時間</th>
      <th>灑水方式</th><th style="width:80px;">累計用水量(m³)</th><th style="width:75px;">灑水面積(m²)</th>
      <th style="width:90px;">操作人員<br>姓名</th><th style="width:110px;">備註<br><span style="font-weight:400;font-size:10px;">（水表紀錄）</span></th>
    </tr></thead><tbody id="recordBody"></tbody></table></div>
    <div class="sig-section">
      <div class="sg"><label>承包商填表人員簽名</label><input type="text" id="sig1" placeholder="姓名">
        <div class="sig-img-area"><button class="sig-img-btn" onclick="document.getElementById('sigFile1').click()">📎 上傳簽名檔</button><input type="file" id="sigFile1" accept="image/*" style="display:none" onchange="loadSigImg('1',event)"><img class="sig-img-preview" id="sigImg1"><button class="sig-img-clear" id="sigClear1" onclick="clearSigImg('1')">✕ 移除</button></div>
      </div>
      <div class="sg"><label>環境保護管理負責人簽名</label><input type="text" id="sig2" placeholder="姓名">
        <div class="sig-img-area"><button class="sig-img-btn" onclick="document.getElementById('sigFile2').click()">📎 上傳簽名檔</button><input type="file" id="sigFile2" accept="image/*" style="display:none" onchange="loadSigImg('2',event)"><img class="sig-img-preview" id="sigImg2"><button class="sig-img-clear" id="sigClear2" onclick="clearSigImg('2')">✕ 移除</button></div>
      </div>
    </div>
    <p class="note-text">※ 本人保證以上紀錄屬實，如有填寫不實記錄，願依「空氣污染防制法」第六十二條第一項第四款之規定辦理。<br>※ 每日至少灑水兩次（上下午各一次），若遇揚塵嚴重情形或有可能導致揚塵之工項應加強灑水頻率。</p>
  </div>

  <div class="tab-page hidden" id="tab1">
    <div class="photo-grid-ui" id="photoGrid"></div>
    <div class="sig-section">
      <div class="sg"><label>承包商填表人員簽名</label><input type="text" id="sig3" placeholder="姓名">
        <div class="sig-img-area"><button class="sig-img-btn" onclick="document.getElementById('sigFile3').click()">📎 上傳簽名檔</button><input type="file" id="sigFile3" accept="image/*" style="display:none" onchange="loadSigImg('3',event)"><img class="sig-img-preview" id="sigImg3"><button class="sig-img-clear" id="sigClear3" onclick="clearSigImg('3')">✕ 移除</button></div>
      </div>
      <div class="sg"><label>環境保護管理負責人簽名</label><input type="text" id="sig4" placeholder="姓名">
        <div class="sig-img-area"><button class="sig-img-btn" onclick="document.getElementById('sigFile4').click()">📎 上傳簽名檔</button><input type="file" id="sigFile4" accept="image/*" style="display:none" onchange="loadSigImg('4',event)"><img class="sig-img-preview" id="sigImg4"><button class="sig-img-clear" id="sigClear4" onclick="clearSigImg('4')">✕ 移除</button></div>
      </div>
    </div>
  </div>

  <div class="tab-page hidden" id="tab2">
    <div class="list-toolbar">
      <button class="btn btn-save btn-sm" onclick="newRecord()">➕ 新增紀錄</button>
      <input type="text" id="listSearch" placeholder="搜尋日期或地點..." oninput="renderList()">
      <select id="listSort" onchange="renderList()"><option value="date_desc">日期（新→舊）</option><option value="date_asc">日期（舊→新）</option><option value="loc_asc">地點 A→Z</option></select>
      <button class="btn btn-danger btn-sm" onclick="deleteSelected()">刪除勾選</button>
      <button class="btn btn-outline btn-sm" onclick="fetchRecords()">🔄 重新整理</button>
      <span id="listCount" style="font-size:12px;color:var(--text-light);margin-left:auto;"></span>
    </div>
    <table class="list-table"><thead><tr>
      <th style="width:36px;"><input type="checkbox" id="listCheckAll" onchange="toggleCheckAll()"></th>
      <th onclick="sortCol('date')">起始日期 ▼</th><th onclick="sortCol('end')">結束日期 ▼</th>
      <th onclick="sortCol('loc')">地點 ▼</th>
      <th style="width:120px;">操作</th>
    </tr></thead><tbody id="listBody"></tbody></table>
  </div>

  <div class="actions" id="actionBar">
    <button class="btn btn-outline btn-sm" onclick="newRecord()" style="margin-right:auto;">➕ 新增紀錄</button>
    <button class="btn btn-danger btn-sm" onclick="clearForm()">清除表單</button>
    <button class="btn btn-save" onclick="saveToCloud()" id="btnSave">☁️ 儲存紀錄</button>
    <button class="btn btn-outline" onclick="openPreview()" style="border-color:var(--pm);color:var(--pm);">👁️ 預覽</button>
    <button class="btn btn-pdf" onclick="exportPDF()" id="btnPdf">匯出 PDF</button>
    <button class="btn btn-primary btn-sm" onclick="exportJSON()">匯出 JSON</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">匯入 JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="saving-overlay" id="savingOverlay"><div class="saving-box"><div class="spinner"></div><p id="savingMsg">儲存中...</p></div></div>
<div class="dialog-overlay" id="postSaveDialog">
  <div class="dialog-box">
    <h3>✅ 儲存成功</h3>
    <p id="postSaveMsg">紀錄已儲存至 Google Sheets</p>
    <button class="btn btn-pdf" onclick="postSaveExportPdf()">匯出 PDF</button>
    <button class="btn btn-save" onclick="postSaveNewRecord()">➕ 新增紀錄</button>
    <button class="btn btn-outline btn-sm" onclick="closePostSave()" style="margin-top:10px;display:block;margin-left:auto;margin-right:auto;">關閉</button>
  </div>
</div>

  <div class="preview-inner">
    <div class="preview-toolbar">
      <h3>📄 預覽紀錄</h3>
      <button class="btn btn-pdf btn-sm" onclick="exportPdfFromPreview()">匯出 PDF</button>
      <button class="btn btn-outline btn-sm" onclick="closePreview()">✕ 關閉</button>
    </div>

<script>
// ★★★ 貼上你的 Apps Script 部署 URL ★★★
const API_URL = 'YOUR_APPS_SCRIPT_DEPLOY_URL_HERE';

const DAYS=5,PHOTOS=6,methods=['人工灑水','灑水車','灑水器自動噴灑','其他'],DM=1;
let cachedRecords=[];

function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' error':'')+' show';setTimeout(()=>t.classList.remove('show'),3000);}
function showSaving(msg){document.getElementById('savingMsg').textContent=msg||'儲存中...';document.getElementById('savingOverlay').classList.add('active');}
function hideSaving(){document.getElementById('savingOverlay').classList.remove('active');}
function setSyncDot(state){const d=document.getElementById('syncDot');d.className='sync-dot '+state;}

function addDays(s,n){const p=s.split('-');const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){if(!s)return'—';const p=s.split('-');const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));return`${s.replace(/-/g,'/')}（${'日一二三四五六'[d.getDay()]}）`;}
function fmtShort(s){return s?s.replace(/-/g,'/'):'—';}
function fmtTW(s){if(!s)return'';const p=s.split('-');return`${parseInt(p[0])-1911}/${p[1]}/${p[2]}`;}

function snapToMonday(ds){const p=ds.split('-');const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));const dow=d.getDay();const diff=dow===0?-6:(1-dow);if(diff!==0)d.setDate(d.getDate()+diff);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// Normalize date: "2026-03-15T16:00:00.000Z" → "2026-03-15", or keep "2026-03-15"
function normDate(s){
  if(!s)return'';
  if(s.includes('T'))return s.split('T')[0];
  return s.slice(0,10);
}

function checkDuplicate(startDate,loc){
  const nd=normDate(startDate);
  return cachedRecords.find(r=>normDate(r.startDate)===nd&&r.location===loc);
}

function getLocation(){const v=document.getElementById('locSelect').value;return v==='__other'?(document.getElementById('locCustom').value.trim()||''):v;}
function onLocChange(){document.getElementById('locCustom').classList.toggle('show',document.getElementById('locSelect').value==='__other');syncLocToPhotos();
  const s=document.getElementById('startDate').value;if(s){const dup=checkDuplicate(s,getLocation());if(dup)toast(`⚠️ ${getLocation()} ${fmtShort(s)} 已有一筆紀錄`,true);}
}
function syncLocToPhotos(){const loc=getLocation()||'—';for(let i=0;i<5;i++){const el=document.getElementById(`ph_loc_${i}`);if(el)el.textContent=loc;}}

function switchTab(idx){
  document.querySelectorAll('.tab-page').forEach((p,i)=>p.classList.toggle('hidden',i!==idx));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('metaBar').classList.toggle('hidden',idx===2);
  document.getElementById('actionBar').classList.toggle('hidden',idx===2);
  if(idx===2)renderList();
}

function onStartDateChange(){
  let s=document.getElementById('startDate').value;if(!s)return;
  const snapped=snapToMonday(s);if(snapped!==s){s=snapped;document.getElementById('startDate').value=s;}
  for(let d=0;d<DAYS;d++){const el=document.getElementById(`dayLabel_${d}`);if(el)el.textContent=fmtDate(addDays(s,d));}
  for(let i=0;i<5;i++){const ds=addDays(s,i);
    const disp=document.getElementById(`ph_date_disp_${i}`);if(disp)disp.textContent=fmtDate(ds);
    const hid=document.getElementById(`ph_date_${i}`);if(hid)hid.value=ds;}
  // Check duplicate
  const loc=getLocation();
  const dup=checkDuplicate(s,loc);
  if(dup){
    if(confirm(`${loc} ${fmtShort(s)} 已有一筆紀錄，是否帶入既有資料？\n\n按「確定」→ 帶入資料\n按「取消」→ 新增空白紀錄`)){
      editRecord(dup.id);
    }
  }
}

function onFieldChange(srcId,ft){const val=document.getElementById(srcId).value;if(!val)return;
  for(let d=0;d<DAYS;d++)for(let p=0;p<2;p++){const id=`d${d}p${p}_${ft}`;if(id===srcId)continue;const el=document.getElementById(id);if(!el.value){el.value=val;el.classList.add('auto-filled');}}
}

function rSnap(lo,hi){const s=[];for(let m=lo;m<=hi;m+=10)s.push(m);return s[Math.floor(Math.random()*s.length)];}
function m2t(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function randomizeTimes(){for(let d=0;d<DAYS;d++)for(let p=0;p<2;p++){const rid=`d${d}p${p}`,st=p===0?rSnap(510,690):rSnap(810,980);document.getElementById(`${rid}_start`).value=m2t(st);document.getElementById(`${rid}_end`).value=m2t(st+10);}}

function buildRecordTable(){const tb=document.getElementById('recordBody');tb.innerHTML='';
  for(let d=0;d<DAYS;d++){const hdr=document.createElement('tr');hdr.className='day-header';hdr.innerHTML=`<td colspan="8">第${d+1}天　<span class="day-label-date" id="dayLabel_${d}">請選擇起始日期</span></td>`;tb.appendChild(hdr);
    ['上午','下午'].forEach((per,pi)=>{const tr=document.createElement('tr');if(pi===1)tr.style.borderBottom='2px solid #ddd';const rid=`d${d}p${pi}`;
      tr.innerHTML=`<td><span class="period-tag ${pi===0?'period-am':'period-pm'}">${per}</span></td><td><input type="time" id="${rid}_start"></td><td><input type="time" id="${rid}_end"></td><td><div class="mc">${methods.map((m,mi)=>`<label><input type="checkbox" id="${rid}_m${mi}" ${mi===DM?'checked':''}> ${m}</label>`).join('')}</div></td><td><input type="number" id="${rid}_water" step="0.1" min="0" onchange="onFieldChange('${rid}_water','water')"></td><td><input type="number" id="${rid}_len" step="0.1" min="0" onchange="onFieldChange('${rid}_len','len')"></td><td><input type="text" id="${rid}_person" onchange="onFieldChange('${rid}_person','person')"></td><td><input type="text" id="${rid}_note" placeholder="水表度數"></td>`;tb.appendChild(tr);});}}

function buildPhotoGrid(){const g=document.getElementById('photoGrid');g.innerHTML='';
  // First 5: one per day, auto-filled date
  for(let i=0;i<5;i++){const c=document.createElement('div');c.className='photo-card';
    c.innerHTML=`<div class="photo-card-header"><label>地點：</label><span class="loc-tag" id="ph_loc_${i}">—</span><label>日期：</label><span class="date-display" id="ph_date_disp_${i}">—</span><input type="hidden" id="ph_date_${i}"></div><div class="photo-drop" id="drop_${i}" onclick="document.getElementById('file_${i}').click()"><div class="ph"><svg width="32" height="32" fill="none" stroke="#bbb" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>點擊上傳照片</div><img id="img_${i}" alt=""><input type="file" id="file_${i}" accept="image/*" onchange="handlePhoto(${i},event)"></div>`;g.appendChild(c);}
  // 6th: custom blank
  const c=document.createElement('div');c.className='photo-card';
  c.innerHTML=`<div class="photo-card-header"><label>地點：</label><input type="text" id="ph_custom_loc" placeholder="自填地點" style="width:80px;border:1px solid #ccc;border-radius:4px;padding:3px 6px;font-size:12px;"><label>日期：</label><input type="date" id="ph_date_5" style="border:1px solid #ccc;border-radius:4px;padding:3px 6px;font-size:12px;"></div><div class="photo-drop" id="drop_5" onclick="document.getElementById('file_5').click()"><div class="ph"><svg width="32" height="32" fill="none" stroke="#bbb" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>點擊上傳照片</div><img id="img_5" alt=""><input type="file" id="file_5" accept="image/*" onchange="handlePhoto(5,event)"></div>`;
  g.appendChild(c);
}
function handlePhoto(i,e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById(`img_${i}`).src=ev.target.result;document.getElementById(`drop_${i}`).classList.add('has-img');};r.readAsDataURL(f);}

function loadSigImg(n,e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=document.getElementById('sigImg'+n);img.src=ev.target.result;img.classList.add('has');document.getElementById('sigClear'+n).classList.add('has');};r.readAsDataURL(f);}
function clearSigImg(n){const img=document.getElementById('sigImg'+n);img.src='';img.classList.remove('has');document.getElementById('sigClear'+n).classList.remove('has');document.getElementById('sigFile'+n).value='';}
function getSigImgSrc(n){const img=document.getElementById('sigImg'+n);return(img&&img.classList.contains('has'))?img.src:'';}

function collectPhotos(){
  const photos=[];
  for(let i=0;i<5;i++){
    const img=document.getElementById(`img_${i}`);
    photos.push({date:document.getElementById(`ph_date_${i}`).value,image:img.src||''});
  }
  // 6th custom
  const img5=document.getElementById('img_5');
  const cl=document.getElementById('ph_custom_loc');
  photos.push({date:document.getElementById('ph_date_5').value,image:img5.src||'',customLoc:cl?cl.value:''});
  return photos;
}

// ===== API calls =====
async function apiPost(body){
  const resp=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body),redirect:'follow'});
  return await resp.json();
}
async function apiGet(params){
  const url=API_URL+'?'+new URLSearchParams(params).toString();
  const resp=await fetch(url,{redirect:'follow'});
  return await resp.json();
}

// ===== Upload photos to Drive =====
async function uploadImagesToDrive(base64List){
  if(!base64List.length)return[];
  const photos=base64List.map((b,i)=>{
    if(!b)return null;
    const match=b.match(/^data:([^;]+);base64,/);
    return{base64:b,filename:`photo_${Date.now()}_${i}.jpg`,mimeType:match?match[1]:'image/jpeg'};
  }).filter(Boolean);
  if(!photos.length)return base64List.map(()=>'');
  const result=await apiPost({action:'uploadBatch',photos});
  // Map back: for items that were null, return ''
  let ui=0;
  return base64List.map(b=>{if(!b)return'';return(result.urls&&result.urls[ui++])||'';});
}

// ===== Fetch records from Sheets =====
async function fetchRecords(){
  try{
    setSyncDot('loading');
    const data=await apiGet({action:'list'});
    cachedRecords=(data.records||[]).map(r=>({
      id:r.id,startDate:r.startDate,location:r.location,projectName:r.projectName,
      days:typeof r.daysJson==='string'?JSON.parse(r.daysJson||'[]'):r.daysJson,
      photos:typeof r.photosJson==='string'?JSON.parse(r.photosJson||'[]'):r.photosJson,
      signatures:typeof r.signaturesJson==='string'?JSON.parse(r.signaturesJson||'{}'):r.signaturesJson,
      createdAt:r.createdAt
    }));
    setSyncDot('ok');
    renderList();
  }catch(err){
    console.error(err);
    setSyncDot('err');
    toast('⚠️ 無法連線 Google Sheets',true);
  }
}

// ===== Save to cloud =====
async function saveToCloud(){
  const sd=document.getElementById('startDate').value;
  if(!sd){toast('請先選擇起始日期',true);return;}
  const loc=getLocation();
  // Check duplicate: same date+location
  const dup=cachedRecords.find(r=>r.startDate===sd&&r.location===loc);
  if(dup){
    if(!confirm(`${loc} ${fmtShort(sd)} 已有一筆紀錄，是否覆蓋更新？`))return;
  }
  const btn=document.getElementById('btnSave');btn.disabled=true;
  showSaving('上傳照片中...');

  try{
    // 1. Collect all base64 images
    const photoBase64=[];
    for(let i=0;i<PHOTOS;i++){
      const img=document.getElementById(`img_${i}`);
      const src=(img&&img.src&&img.src.startsWith('data:'))?img.src:'';
      photoBase64.push(src);
    }
    const sigBase64=[getSigImgSrc('1'),getSigImgSrc('2'),getSigImgSrc('3'),getSigImgSrc('4')];
    const allImages=[...photoBase64,...sigBase64];

    // 2. Upload all to Drive
    showSaving(`上傳 ${allImages.filter(Boolean).length} 張圖片中...`);
    const urls=await uploadImagesToDrive(allImages);
    const photoUrls=urls.slice(0,PHOTOS);
    const sigUrls=urls.slice(PHOTOS);

    // 3. Build record data
    const days=[];
    for(let d=0;d<DAYS;d++){
      const day={date:addDays(sd,d),periods:[]};
      for(let p=0;p<2;p++){const rid=`d${d}p${p}`;
        day.periods.push({period:p===0?'上午':'下午',start:document.getElementById(`${rid}_start`).value,
          end:document.getElementById(`${rid}_end`).value,
          methods:methods.filter((_,mi)=>document.getElementById(`${rid}_m${mi}`).checked),
          water:document.getElementById(`${rid}_water`).value,length:document.getElementById(`${rid}_len`).value,
          person:document.getElementById(`${rid}_person`).value,note:document.getElementById(`${rid}_note`).value});}
      days.push(day);
    }

    const photos=[];
    for(let i=0;i<5;i++){
      photos.push({date:document.getElementById(`ph_date_${i}`).value,imageUrl:photoUrls[i]||''});
    }
    // 6th custom photo
    const cl6=document.getElementById('ph_custom_loc');
    photos.push({date:document.getElementById('ph_date_5').value,imageUrl:photoUrls[5]||'',customLoc:cl6?cl6.value:''});

    const signatures={
      c1:document.getElementById('sig1').value,e1:document.getElementById('sig2').value,
      c2:document.getElementById('sig3').value,e2:document.getElementById('sig4').value,
      cImg1:sigUrls[0]||'',eImg1:sigUrls[1]||'',cImg2:sigUrls[2]||'',eImg2:sigUrls[3]||''
    };

    showSaving('儲存紀錄中...');
    const result=await apiPost({action:'save',data:{
      startDate:sd,location:getLocation(),
      projectName:document.getElementById('projectName').value,
      days,photos,signatures
    }});

    if(result.success){
      await fetchRecords();
      hideSaving();btn.disabled=false;
      // Show post-save dialog
      document.getElementById('postSaveMsg').textContent=result.updated?'已更新既有紀錄':'已新增至 Google Sheets';
      document.getElementById('postSaveDialog').classList.add('active');
      return;
    }else{
      toast('❌ 儲存失敗：'+(result.error||''),true);
    }
  }catch(err){
    console.error(err);
    toast('❌ 儲存失敗：'+err.message,true);
  }

  hideSaving();btn.disabled=false;
}

// ===== Delete from cloud =====
async function deleteSelected(){
  const ids=[...document.querySelectorAll('.list-chk:checked')].map(c=>c.dataset.id);
  if(!ids.length){toast('請先勾選',true);return;}
  if(!confirm(`刪除 ${ids.length} 筆？`))return;
  showSaving('刪除中...');
  for(const id of ids){
    try{await apiPost({action:'delete',id});}catch(e){console.error(e);}
  }
  hideSaving();toast('已刪除');
  await fetchRecords();
}

// ===== Render list from cache =====
function renderList(){
  const q=(document.getElementById('listSearch').value||'').toLowerCase(),sort=document.getElementById('listSort').value;
  let f=cachedRecords.filter(r=>((normDate(r.startDate)||'')+(r.location||'')).toLowerCase().includes(q));
  f.sort((a,b)=>{const ad=normDate(a.startDate)||'',bd=normDate(b.startDate)||'';if(sort==='date_desc')return bd.localeCompare(ad);if(sort==='date_asc')return ad.localeCompare(bd);return(a.location||'').localeCompare(b.location||'');});
  const tb=document.getElementById('listBody');document.getElementById('listCount').textContent=`共 ${f.length} 筆`;
  document.getElementById('listCheckAll').checked=false;
  if(!f.length){tb.innerHTML='<tr><td colspan="5" class="no-data">尚無儲存紀錄</td></tr>';return;}
  tb.innerHTML=f.map(r=>{const sd=normDate(r.startDate);const ed=sd?addDays(sd,DAYS-1):'';
    return`<tr><td><input type="checkbox" class="list-chk" data-id="${r.id}"></td>
    <td>${fmtShort(sd)}</td><td>${fmtShort(ed)}</td>
    <td><span class="badge">${r.location||'—'}</span></td>
    <td><button class="btn btn-outline btn-sm" onclick="previewRecord('${r.id}')" style="margin-right:4px;">👁️</button><button class="btn btn-outline btn-sm" onclick="editRecord('${r.id}')">編輯</button></td></tr>`;}).join('');
}
function toggleCheckAll(){const v=document.getElementById('listCheckAll').checked;document.querySelectorAll('.list-chk').forEach(c=>c.checked=v);}
function sortCol(c){const sel=document.getElementById('listSort');if(c==='date'||c==='end')sel.value=sel.value==='date_desc'?'date_asc':'date_desc';else sel.value='loc_asc';renderList();}

function editRecord(id){
  const r=cachedRecords.find(x=>x.id===id);if(!r){toast('找不到',true);return;}
  clearFormSilent();
  document.getElementById('projectName').value=r.projectName||'';
  const loc=r.location||'';const sel=document.getElementById('locSelect');
  if(loc==='台中'||loc==='通霄'){sel.value=loc;document.getElementById('locCustom').classList.remove('show');}
  else{sel.value='__other';document.getElementById('locCustom').classList.add('show');document.getElementById('locCustom').value=loc;}
  syncLocToPhotos();
  const sd=normDate(r.startDate);
  if(sd){document.getElementById('startDate').value=sd;
    // Set dates without triggering duplicate check
    const snapped=snapToMonday(sd);document.getElementById('startDate').value=snapped;
    for(let d=0;d<DAYS;d++){const el=document.getElementById(`dayLabel_${d}`);if(el)el.textContent=fmtDate(addDays(snapped,d));}
    for(let i=0;i<5;i++){const ds=addDays(snapped,i);
      const disp=document.getElementById(`ph_date_disp_${i}`);if(disp)disp.textContent=fmtDate(ds);
      const hid=document.getElementById(`ph_date_${i}`);if(hid)hid.value=ds;}
  }
  (r.days||[]).forEach((day,d)=>{if(d>=DAYS)return;
    (day.periods||[]).forEach((per,p)=>{const rid=`d${d}p${p}`;
      document.getElementById(`${rid}_start`).value=per.start||'';document.getElementById(`${rid}_end`).value=per.end||'';
      methods.forEach((m,mi)=>{document.getElementById(`${rid}_m${mi}`).checked=(per.methods||[]).includes(m);});
      document.getElementById(`${rid}_water`).value=per.water||'';document.getElementById(`${rid}_len`).value=per.length||'';
      document.getElementById(`${rid}_person`).value=per.person||'';document.getElementById(`${rid}_note`).value=per.note||'';});});
  // Load photos
  (r.photos||[]).forEach((ph,i)=>{if(i>=PHOTOS)return;
    const src=ph.imageUrl||ph.image||'';
    if(src){document.getElementById(`img_${i}`).src=src;document.getElementById(`drop_${i}`).classList.add('has-img');}
    // 6th custom photo
    if(i===5&&ph.customLoc){const cl=document.getElementById('ph_custom_loc');if(cl)cl.value=ph.customLoc;}
    if(i===5&&ph.date){const pd=document.getElementById('ph_date_5');if(pd)pd.value=normDate(ph.date);}
  });
  const s=r.signatures||{};
  document.getElementById('sig1').value=s.c1||'';document.getElementById('sig2').value=s.e1||'';
  document.getElementById('sig3').value=s.c2||'';document.getElementById('sig4').value=s.e2||'';
  [['1',s.cImg1],['2',s.eImg1],['3',s.cImg2],['4',s.eImg2]].forEach(([n,src])=>{
    if(src){const img=document.getElementById('sigImg'+n);img.src=src;img.classList.add('has');document.getElementById('sigClear'+n).classList.add('has');}});
  switchTab(0);toast('已載入紀錄');
}

function clearFormSilent(){
  document.querySelectorAll('#tab0 input[type="text"],#tab0 input[type="number"],#tab0 input[type="time"],#tab1 input[type="text"]').forEach(el=>el.value='');
  document.querySelectorAll('input[type="checkbox"]').forEach(el=>el.checked=false);
  for(let d=0;d<DAYS;d++)for(let p=0;p<2;p++)document.getElementById(`d${d}p${p}_m${DM}`).checked=true;
  document.querySelectorAll('.photo-drop').forEach(el=>el.classList.remove('has-img'));
  document.querySelectorAll('.photo-drop img').forEach(el=>el.src='');
  document.querySelectorAll('.auto-filled').forEach(el=>el.classList.remove('auto-filled'));
  document.getElementById('projectName').value='通霄電廠第二期更新改建計畫－海底輸氣管線統包工程';
  document.getElementById('startDate').value='';
  document.getElementById('locSelect').value='台中';document.getElementById('locCustom').value='';document.getElementById('locCustom').classList.remove('show');
  for(let d=0;d<DAYS;d++)document.getElementById(`dayLabel_${d}`).textContent='請選擇起始日期';
  for(let i=0;i<5;i++){document.getElementById(`ph_date_disp_${i}`).textContent='—';document.getElementById(`ph_date_${i}`).value='';}
  const phd5=document.getElementById('ph_date_5');if(phd5)phd5.value='';
  const pcl=document.getElementById('ph_custom_loc');if(pcl)pcl.value='';
  ['sig1','sig2','sig3','sig4'].forEach(id=>document.getElementById(id).value='');
  ['1','2','3','4'].forEach(n=>{const img=document.getElementById('sigImg'+n);if(img){img.src='';img.classList.remove('has');}const cl=document.getElementById('sigClear'+n);if(cl)cl.classList.remove('has');const fi=document.getElementById('sigFile'+n);if(fi)fi.value='';});
  syncLocToPhotos();
}
function clearForm(){if(!confirm('確定清除表單？'))return;clearFormSilent();
  const now=new Date();document.getElementById('startDate').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  onStartDateChange();randomizeTimes();syncLocToPhotos();}

function newRecord(){
  clearFormSilent();
  const now=new Date();document.getElementById('startDate').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  onStartDateChange();randomizeTimes();syncLocToPhotos();
  switchTab(0);
  toast('📝 已建立新表單');
}

function closePostSave(){document.getElementById('postSaveDialog').classList.remove('active');}

// ===== PDF =====
function buildPage1(data){

    const dc=pi===0?`<td rowspan="2" style="font-size:9px;white-space:nowrap;vertical-align:middle;">${fmtTW(day.date)}</td>`:'';
    rows+=`<tr>${dc}<td>${per.start||''}</td><td>${per.end||''}</td><td style="text-align:left;padding-left:4px;">${mh}</td><td>${per.water||''}</td><td>${per.note||''}</td><td>${per.length||''}</td><td>${per.person||''}</td><td></td></tr>`;});});
  const s=data.signatures||{};
  return`<div class="pf-page"><div class="pf-loc-corner">地點：${loc}</div>
    <div class="pf-hdr">通霄電廠第二期更新改建計畫－海底輸氣管線統包工程</div><div class="pf-hdr-en">Tung-Hsiao Power Plant 2nd Stage Renewal Project Turn-key Contract of Subsea Pipeline</div>
    <div class="pf-title">營建工地每日噴灑水作業紀錄表</div><div class="pf-meta">工程名稱：${proj}</div>
    <table class="pf-tbl"><colgroup><col style="width:9%"><col style="width:6%"><col style="width:6%"><col style="width:34%"><col style="width:7%"><col style="width:7%"><col style="width:6%"><col style="width:8%"><col style="width:6%"></colgroup>
    <thead><tr><th>日期<br>(年/月/日)</th><th>開始<br>時間</th><th>結束<br>時間</th><th>灑水方式</th><th>累計<br>用水量<br>(m³)</th><th>水表<br>度數</th><th>灑水<br>面積(m²)</th><th>操作人員<br>姓名</th><th>備註</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="pf-decl">本人保證以上紀錄屬實，如有填寫不實記錄，願依「空氣污染防制法」第六十二條第一項第四款之規定辦理。</div>
    <div class="pf-sig-row"><div>承包商填表人員簽名<div class="pf-sig-val">${s.c1||''}${s.cImg1?`<img src="${s.cImg1}" style="height:36px;max-width:150px;object-fit:contain;display:block;margin-top:2px;">`:''}</div></div><div style="text-align:right;">環境保護管理負責人簽名<div class="pf-sig-val">${s.e1||''}${s.eImg1?`<img src="${s.eImg1}" style="height:36px;max-width:150px;object-fit:contain;display:block;margin-top:2px;margin-left:auto;">`:''}</div></div></div>
    <div class="pf-note">註：每日至少灑水兩次(上下午各一次)，若遇揚塵嚴重情形或有可能導致揚塵之工項應加強灑水頻率。</div></div>`;
}
function buildPage2(data){
  const proj=data.projectName,loc=data.location;let ph='';
  data.photos.forEach((p,i)=>{
    const imgSrc=p.imageUrl||p.image||'';
    const area=p.customLoc||loc;

async function exportPDF(){
  const btn=document.getElementById('btnPdf');btn.disabled=true;btn.textContent='產生中...';
  const sd=document.getElementById('startDate').value,loc=getLocation(),proj=document.getElementById('projectName').value;
  // Build data from form for PDF
  const days=[];
  for(let d=0;d<DAYS;d++){const day={date:sd?addDays(sd,d):'',periods:[]};
    for(let p=0;p<2;p++){const rid=`d${d}p${p}`;day.periods.push({period:p===0?'上午':'下午',start:document.getElementById(`${rid}_start`).value,end:document.getElementById(`${rid}_end`).value,methods:methods.filter((_,mi)=>document.getElementById(`${rid}_m${mi}`).checked),water:document.getElementById(`${rid}_water`).value,length:document.getElementById(`${rid}_len`).value,person:document.getElementById(`${rid}_person`).value,note:document.getElementById(`${rid}_note`).value});}days.push(day);}
  const photos=collectPhotos();
  const signatures={c1:document.getElementById('sig1').value,e1:document.getElementById('sig2').value,cImg1:getSigImgSrc('1'),eImg1:getSigImgSrc('2')};
  const data={projectName:proj,location:loc,days,photos,signatures};

  const overlay=document.getElementById('pdfOverlay');const content=document.getElementById('pdfContent');
  content.innerHTML=buildPage1(data)+'<div class="pf-break"></div>'+buildPage2(data);
  overlay.classList.add('active');window.scrollTo(0,0);
  const imgs=content.querySelectorAll('img');
  if(imgs.length){await Promise.all([...imgs].map(img=>new Promise(r=>{if(img.complete&&img.naturalHeight>0)r();else{img.onload=r;img.onerror=r;}})));}
  await new Promise(r=>setTimeout(r,500));
  try{await html2pdf().set({margin:0,filename:`灑水紀錄_${loc}_${sd||'record'}.pdf`,image:{type:'jpeg',quality:0.92},html2canvas:{scale:2,useCORS:true,logging:false,scrollX:0,scrollY:0,width:1080},jsPDF:{unit:'px',format:[1080,765],orientation:'landscape',hotfixes:['px_scaling']},pagebreak:{mode:['css'],before:['.pf-break']}}).from(content).save();
    toast('✅ PDF 已產生');}catch(err){toast('PDF匯出失敗：'+err.message,true);}
  overlay.classList.remove('active');content.innerHTML='';btn.disabled=false;btn.textContent='匯出 PDF';
}

function previewRecord(id){
  const r=cachedRecords.find(x=>x.id===id);
  if(!r){toast('找不到紀錄',true);return;}
  // Map cloud data format to preview format
  const mapped={projectName:r.projectName,location:r.location,startDate:r.startDate,days:r.days||[],
    photos:(r.photos||[]).map(p=>({date:p.date,image:p.imageUrl||p.image||''})),
    signatures:r.signatures||{}};
  showPreviewModal(mapped);
}

function showPreviewModal(data){
  const body=document.getElementById('previewBody');
  body.innerHTML=buildPage1(data)+'<hr style="border:none;border-top:2px dashed #ccc;margin:0;">'+buildPage2(data);
  document.getElementById('previewModal').classList.add('active');
  document.getElementById('previewModal')._data=data; // store for export
}

function closePreview(){
  document.getElementById('previewModal').classList.remove('active');
  document.getElementById('previewBody').innerHTML='';
}

  const photos=collectPhotos();
  const data={startDate:sd,location:loc,projectName:document.getElementById('projectName').value,days,photos,signatures:{c1:document.getElementById('sig1').value,e1:document.getElementById('sig2').value,c2:document.getElementById('sig3').value,e2:document.getElementById('sig4').value,cImg1:getSigImgSrc('1'),eImg1:getSigImgSrc('2'),cImg2:getSigImgSrc('3'),eImg2:getSigImgSrc('4')}};

function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);clearFormSilent();
    document.getElementById('projectName').value=d.projectName||'';
    const loc=d.location||'';const sel=document.getElementById('locSelect');
    if(loc==='台中'||loc==='通霄'){sel.value=loc;}else{sel.value='__other';document.getElementById('locCustom').classList.add('show');document.getElementById('locCustom').value=loc;}
    syncLocToPhotos();
    if(d.startDate){document.getElementById('startDate').value=d.startDate;onStartDateChange();}
    (d.days||[]).forEach((day,di)=>{if(di>=DAYS)return;(day.periods||[]).forEach((per,p)=>{const rid=`d${di}p${p}`;document.getElementById(`${rid}_start`).value=per.start||'';document.getElementById(`${rid}_end`).value=per.end||'';methods.forEach((m,mi)=>{document.getElementById(`${rid}_m${mi}`).checked=(per.methods||[]).includes(m);});document.getElementById(`${rid}_water`).value=per.water||'';document.getElementById(`${rid}_len`).value=per.length||'';document.getElementById(`${rid}_person`).value=per.person||'';document.getElementById(`${rid}_note`).value=per.note||'';});});
    (d.photos||[]).forEach((ph,i)=>{if(i>=PHOTOS)return;const src=ph.image||ph.imageUrl;if(src){document.getElementById(`img_${i}`).src=src;document.getElementById(`drop_${i}`).classList.add('has-img');}
      if(i===5&&ph.customLoc){const cl=document.getElementById('ph_custom_loc');if(cl)cl.value=ph.customLoc;}
      if(i===5&&ph.date){const pd=document.getElementById('ph_date_5');if(pd)pd.value=normDate(ph.date);}
    });
    const s=d.signatures||{};document.getElementById('sig1').value=s.c1||'';document.getElementById('sig2').value=s.e1||'';document.getElementById('sig3').value=s.c2||'';document.getElementById('sig4').value=s.e2||'';
    toast('✅ 匯入成功');}catch(err){toast('匯入失敗：'+err.message,true);}};r.readAsText(f);e.target.value='';}
